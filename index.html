<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Old World Codex — WFRP4e Knowledge Base</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f4e8c1;
    --parchment-dark: #e8d5a3;
    --ink: #2a1f14;
    --ink-light: #5a4a3a;
    --blood: #8b1a1a;
    --blood-glow: #c62828;
    --gold: #c8a432;
    --gold-dim: #a68a28;
    --shadow: rgba(20, 12, 5, 0.4);
    --panel-bg: rgba(42, 31, 20, 0.92);
    --panel-border: #6b5a42;
    --result-bg: rgba(244, 232, 193, 0.06);
    --result-hover: rgba(200, 164, 50, 0.08);
    --font-display: 'Cinzel', serif;
    --font-body: 'Crimson Text', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--ink);
    color: var(--parchment);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(139, 26, 26, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(200, 164, 50, 0.04) 0%, transparent 40%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(244, 232, 193, 0.01) 2px, rgba(244, 232, 193, 0.01) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    border-bottom: 1px solid var(--panel-border);
    position: relative;
    z-index: 1;
  }

  .header::after {
    content: '⚔';
    display: block;
    font-size: 1.2rem;
    color: var(--gold-dim);
    margin-top: 0.8rem;
    letter-spacing: 1rem;
  }

  .header h1 {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    color: var(--gold);
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header p {
    color: var(--parchment-dark);
    font-style: italic;
    font-size: 1.05rem;
    margin-top: 0.4rem;
    opacity: 0.7;
  }

  .user-info {
    position: absolute;
    top: 1rem;
    right: 1.5rem;
    font-size: 0.8rem;
    color: var(--ink-light);
  }

  .user-info a {
    color: var(--gold-dim);
    text-decoration: none;
  }

  .user-info a:hover { text-decoration: underline; }

  .mode-tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 1.2rem 1rem 0;
    position: relative;
    z-index: 1;
  }

  .mode-tab {
    font-family: var(--font-display);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.7rem 2rem;
    border: 1px solid var(--panel-border);
    background: transparent;
    color: var(--parchment-dark);
    cursor: pointer;
    transition: all 0.3s;
  }

  .mode-tab:first-child { border-radius: 4px 0 0 4px; }
  .mode-tab:last-child { border-radius: 0 4px 4px 0; }

  .mode-tab.active {
    background: var(--blood);
    border-color: var(--blood);
    color: var(--parchment);
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  .mode-tab:not(.active):hover {
    background: rgba(200, 164, 50, 0.1);
    border-color: var(--gold-dim);
  }

  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
    position: relative;
    z-index: 1;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .search-box {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
  }

  .search-input {
    flex: 1;
    font-family: var(--font-body);
    font-size: 1.1rem;
    padding: 0.85rem 1.2rem;
    background: rgba(244, 232, 193, 0.08);
    border: 1px solid var(--panel-border);
    border-right: none;
    border-radius: 4px 0 0 4px;
    color: var(--parchment);
    outline: none;
    transition: border-color 0.3s, background 0.3s;
  }

  .search-input::placeholder { color: var(--ink-light); font-style: italic; }
  .search-input:focus { border-color: var(--gold); background: rgba(244, 232, 193, 0.12); }

  .search-btn {
    font-family: var(--font-display);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.85rem 1.6rem;
    background: var(--blood);
    border: 1px solid var(--blood);
    border-radius: 0 4px 4px 0;
    color: var(--parchment);
    cursor: pointer;
    transition: background 0.3s;
  }

  .search-btn:hover { background: var(--blood-glow); }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .results-info {
    font-size: 0.9rem;
    color: var(--gold-dim);
    margin-bottom: 1rem;
    font-style: italic;
  }

  .result-card {
    background: var(--result-bg);
    border: 1px solid var(--panel-border);
    border-left: 3px solid var(--blood);
    padding: 1.2rem 1.4rem;
    margin-bottom: 0.8rem;
    border-radius: 0 4px 4px 0;
    transition: background 0.2s, border-color 0.2s;
  }

  .result-card:hover {
    background: var(--result-hover);
    border-left-color: var(--gold);
  }

  .result-source {
    font-family: var(--font-display);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .result-source span {
    color: var(--parchment-dark);
    font-family: var(--font-body);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    font-size: 0.85rem;
    margin-left: 0.5rem;
  }

  .result-text {
    font-size: 1rem;
    line-height: 1.65;
    color: var(--parchment-dark);
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
  }

  .result-text::-webkit-scrollbar { width: 4px; }
  .result-text::-webkit-scrollbar-track { background: transparent; }
  .result-text::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }

  .result-score {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--ink-light);
    margin-top: 0.5rem;
  }

  .chat-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 260px);
    min-height: 400px;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 0;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 3px; }

  .chat-msg {
    padding: 1rem 1.3rem;
    border-radius: 4px;
    line-height: 1.65;
    font-size: 1rem;
    max-width: 90%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chat-msg.user {
    align-self: flex-end;
    background: rgba(139, 26, 26, 0.3);
    border: 1px solid rgba(139, 26, 26, 0.5);
    color: var(--parchment);
  }

  .chat-msg.assistant {
    align-self: flex-start;
    background: var(--result-bg);
    border: 1px solid var(--panel-border);
    color: var(--parchment-dark);
  }

  .chat-msg.system {
    align-self: center;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-light);
    border: none;
    background: none;
    padding: 0.5rem;
  }

  .chat-msg.tool {
    align-self: flex-start;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--gold-dim);
    background: rgba(200, 164, 50, 0.04);
    border: 1px solid rgba(200, 164, 50, 0.2);
    border-radius: 4px;
    padding: 0.5rem 0.9rem;
    max-width: 90%;
    opacity: 0.85;
  }

  .chat-msg.tool .tool-label {
    color: var(--gold);
    font-weight: 600;
    margin-right: 0.5rem;
  }

  .chat-input-row {
    display: flex;
    gap: 0;
    margin-top: 1rem;
  }

  .chat-input {
    flex: 1;
    font-family: var(--font-body);
    font-size: 1.05rem;
    padding: 0.85rem 1.2rem;
    background: rgba(244, 232, 193, 0.08);
    border: 1px solid var(--panel-border);
    border-right: none;
    border-radius: 4px 0 0 4px;
    color: var(--parchment);
    outline: none;
    transition: border-color 0.3s;
    resize: none;
    min-height: 48px;
    max-height: 120px;
  }

  .chat-input::placeholder { color: var(--ink-light); font-style: italic; }
  .chat-input:focus { border-color: var(--gold); }

  .chat-send {
    font-family: var(--font-display);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.85rem 1.4rem;
    background: var(--blood);
    border: 1px solid var(--blood);
    border-radius: 0 4px 4px 0;
    color: var(--parchment);
    cursor: pointer;
    transition: background 0.3s;
  }

  .chat-send:hover { background: var(--blood-glow); }
  .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

  .loading {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid var(--panel-border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 0.5rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .doc-list { margin-top: 1rem; }

  .doc-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0.6rem 0;
    border-bottom: 1px solid rgba(107, 90, 66, 0.3);
    font-size: 0.95rem;
  }

  .doc-item:last-child { border-bottom: none; }
  .doc-name { color: var(--parchment); }

  .doc-meta {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--ink-light);
    white-space: nowrap;
    margin-left: 1rem;
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--ink-light);
    font-style: italic;
    font-size: 1.1rem;
  }

  .empty-state::before {
    content: '📜';
    display: block;
    font-size: 2.5rem;
    margin-bottom: 1rem;
    font-style: normal;
  }

  @media (max-width: 600px) {
    .header { padding: 1.5rem 1rem 1rem; }
    .main { padding: 1rem 0.75rem 2rem; }
    .chat-container { height: calc(100vh - 240px); }
    .result-card { padding: 1rem; }
    .mode-tab { padding: 0.6rem 1.2rem; font-size: 0.75rem; }
    .user-info { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="user-info" id="userInfo"></div>
  <h1>The Old World Codex</h1>
  <p>WFRP 4th Edition Knowledge Base</p>
</div>

<div class="mode-tabs">
  <button class="mode-tab active" onclick="switchMode('search', event)">Search</button>
  <button class="mode-tab" onclick="switchMode('chat', event)">Ask the Codex</button>
  <button class="mode-tab" onclick="switchMode('docs', event)">Library</button>
</div>

<div class="main">

  <div id="panel-search" class="panel active">
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput"
             placeholder="Search the tomes... e.g. 'career changes', 'overcasting rules'"
             onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" id="searchBtn" onclick="doSearch()">Search</button>
    </div>
    <div id="searchResults">
      <div class="empty-state">Enter a query to search across all WFRP4e documents.</div>
    </div>
  </div>

  <div id="panel-chat" class="panel">
    <div class="chat-container">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-msg system">Ask anything about WFRP4e rules, lore, careers, spells, creatures, and more. The Codex will search the library as needed and answer from the source material.</div>
      </div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" rows="1"
                  placeholder="Ask the Codex a question..."
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
        <button class="chat-send" id="chatSendBtn" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>

  <div id="panel-docs" class="panel">
    <div id="docsList">
      <div class="empty-state">Loading library catalogue...</div>
    </div>
  </div>

</div>

<script>
  // === Configuration ===
  const MCP_URL = '/api/mcp';
  const MCP_KEY = '';

  // === Auth: show user info if available ===
  async function loadUserInfo() {
    try {
      const resp = await fetch('/.auth/me');
      const data = await resp.json();
      if (data.clientPrincipal) {
        const name = data.clientPrincipal.userDetails || 'Adventurer';
        document.getElementById('userInfo').innerHTML =
          `${escHtml(name)} · <a href="/.auth/logout">Sign out</a>`;
      }
    } catch(e) { /* not on Static Web Apps, skip */ }
  }
  loadUserInfo();

  // === MCP Client ===
  let sessionId = null;

  async function mcpRequest(method, params = {}) {
    const body = { jsonrpc: '2.0', method: method, params: params, id: Date.now() };
    const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json, text/event-stream' };
    const url = MCP_KEY ? `${MCP_URL}?code=${MCP_KEY}` : MCP_URL;
    if (sessionId) headers['mcp-session-id'] = sessionId;

    const resp = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
    const newSessionId = resp.headers.get('mcp-session-id');
    if (newSessionId) sessionId = newSessionId;

    const text = await resp.text();
    const lines = text.split('\n');
    for (const line of lines) {
      if (line.startsWith('data: ')) {
        try { return JSON.parse(line.slice(6)); } catch(e) {}
      }
    }
    try { return JSON.parse(text); } catch(e) {}
    throw new Error('Failed to parse MCP response');
  }

  async function initMcp() {
    try {
      await mcpRequest('initialize', {
        protocolVersion: '2025-11-25',
        capabilities: {},
        clientInfo: { name: 'old-world-codex', version: '1.0.0' }
      });
      const url = MCP_KEY ? `${MCP_URL}?code=${MCP_KEY}` : MCP_URL;
      const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json, text/event-stream' };
      if (sessionId) headers['mcp-session-id'] = sessionId;
      await fetch(url, {
        method: 'POST', headers,
        body: JSON.stringify({ jsonrpc: '2.0', method: 'notifications/initialized' })
      });
    } catch(e) {
      console.error('MCP init failed:', e);
    }
  }

  async function mcpToolCall(toolName, args = {}) {
    const result = await mcpRequest('tools/call', { name: toolName, arguments: args });
    if (result?.result?.content) {
      for (const c of result.result.content) {
        if (c.type === 'text') {
          try { return JSON.parse(c.text); } catch(e) { return c.text; }
        }
      }
    }
    return result;
  }

  // === Search ===
  async function doSearch() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;

    const btn = document.getElementById('searchBtn');
    const container = document.getElementById('searchResults');

    btn.disabled = true;
    btn.textContent = 'Searching...';
    container.innerHTML = '<div class="empty-state"><span class="loading"></span> Consulting the tomes...</div>';

    try {
      const data = await mcpToolCall('search_knowledge_base', { query, max_results: 10 });

      if (data.message && !data.results) {
        container.innerHTML = `<div class="empty-state">${escHtml(data.message)}</div>`;
        return;
      }

      let html = `<div class="results-info">${data.result_count} passages found for "${escHtml(data.query)}"</div>`;
      for (const r of data.results) {
        html += `
          <div class="result-card">
            <div class="result-source">${escHtml(r.document)} <span>Page ${r.page}</span></div>
            <div class="result-text">${escHtml(r.text)}</div>
            <div class="result-score">relevance: ${r.score}</div>
          </div>`;
      }
      container.innerHTML = html;
    } catch(e) {
      container.innerHTML = `<div class="empty-state">Search failed: ${escHtml(e.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search';
    }
  }

  // === Agentic Chat ===
  // Maintains a conversation history in Anthropic message format.
  // Each turn we call /api/chat with the current tools + history.
  // Claude may respond with tool_use blocks; we execute those, append
  // tool_result blocks, and call again until Claude returns a final answer.

  let chatHistory = [];
  const MAX_AGENT_ITERATIONS = 8;

  // Tool definition Claude will see
  const CODEX_TOOLS = [
    {
      name: "search_knowledge_base",
      description: "Search the WFRP4e knowledge base for passages relevant to a query. Returns matching text chunks with document name, page number, and relevance score. Use this tool whenever you need specific rules, lore, stat blocks, career details, spell descriptions, timelines, or any other game content. You can call it multiple times with different queries to gather comprehensive information — for broad topics like timelines or lore compilations, make several targeted searches rather than one broad one.",
      input_schema: {
        type: "object",
        properties: {
          query: {
            type: "string",
            description: "Search query. Can be keywords, phrases, or natural-language questions. The search uses hybrid keyword + semantic matching, so phrase it however feels natural."
          },
          max_results: {
            type: "integer",
            description: "Maximum passages to return (default 5, max 15). Use higher values for broad/compilation questions."
          }
        },
        required: ["query"]
      }
    },
    {
      name: "list_documents",
      description: "List all PDF documents in the WFRP4e knowledge base with their chunk counts and page totals. Useful for orienting yourself to what source material is available before searching.",
      input_schema: { type: "object", properties: {}, required: [] }
    },
    {
      name: "get_document_summary",
      description: "Get the opening chunks of a specific PDF document to see what it's about. Pass the exact filename (from list_documents).",
      input_schema: {
        type: "object",
        properties: {
          document_name: { type: "string", description: "Exact PDF filename, e.g. 'WFRP_Altdorf_Crown_of_the_Empire.pdf'" }
        },
        required: ["document_name"]
      }
    }
  ];

  const SYSTEM_PROMPT = `You are the Old World Codex, an expert assistant for Warhammer Fantasy Roleplay 4th Edition (WFRP4e). You help GMs and players find rules, lore, careers, spells, creatures, items, and any other information from the source books.

You have access to a search_knowledge_base tool that queries a library of 60+ official WFRP4e sourcebooks. Use it aggressively:
- For any question about specific rules, content, or lore, search first before answering from general knowledge.
- For broad or comparative questions (timelines, career comparisons, lists of creatures, etc.) issue multiple targeted searches to build a comprehensive picture.
- Don't hesitate to refine or re-search if the first results don't fully answer the question.

When you answer:
- Cite specific documents and page numbers from search results (the results include this metadata).
- Be precise about game mechanics (skill tests, modifiers, SL thresholds, dice).
- If the source material truly doesn't cover something, say so clearly rather than making things up.
- Keep answers practical and useful at the game table.`;

  async function sendChat() {
    const input = document.getElementById('chatInput');
    const query = input.value.trim();
    if (!query) return;

    const sendBtn = document.getElementById('chatSendBtn');
    input.value = '';
    sendBtn.disabled = true;

    addChatMsg('user', query);
    chatHistory.push({ role: 'user', content: query });

    const statusEl = addChatMsg('system', '<span class="loading"></span> Thinking...');

    try {
      let iteration = 0;
      while (iteration < MAX_AGENT_ITERATIONS) {
        iteration++;

        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system: SYSTEM_PROMPT,
            messages: chatHistory,
            tools: CODEX_TOOLS,
            max_tokens: 4096
          })
        });

        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.error?.message || err.error || `API error ${resp.status}`);
        }

        const data = await resp.json();

        if (data.type === 'error') {
          throw new Error(data.error?.message || 'Claude API error');
        }

        // Append the full assistant message (including any tool_use blocks) to history
        chatHistory.push({ role: 'assistant', content: data.content });

        // Find tool_use blocks that need resolution
        const toolUses = (data.content || []).filter(b => b.type === 'tool_use');

        // If no tool calls, Claude gave a final answer — render and exit loop
        if (toolUses.length === 0) {
          statusEl.remove();
          const textBlocks = (data.content || []).filter(b => b.type === 'text');
          const finalText = textBlocks.map(b => b.text).join('\n\n').trim();
          if (finalText) {
            addChatMsg('assistant', formatMarkdown(finalText), true);
          } else {
            addChatMsg('system', '(no response)');
          }
          break;
        }

        // Execute each tool call and gather results
        const toolResults = [];
        for (const toolUse of toolUses) {
          addToolMsg(toolUse.name, toolUse.input);

          let resultText;
          try {
            const result = await executeTool(toolUse.name, toolUse.input);
            // Keep the result compact — remove the verbose "text" field
            // can cause context bloat if many searches; but for this project
            // the full text is what Claude needs to cite accurately, so keep it.
            resultText = typeof result === 'string' ? result : JSON.stringify(result);
          } catch(e) {
            resultText = JSON.stringify({ error: e.message });
          }

          toolResults.push({
            type: 'tool_result',
            tool_use_id: toolUse.id,
            content: resultText
          });
        }

        // Send tool results back as a user message
        chatHistory.push({ role: 'user', content: toolResults });

        // Loop continues — Claude will see the results and decide next step
      }

      if (iteration >= MAX_AGENT_ITERATIONS) {
        statusEl.remove();
        addChatMsg('system', '(agent loop hit max iterations)');
      }
    } catch(e) {
      statusEl.remove();
      addChatMsg('system', `Error: ${escHtml(e.message)}`);
      console.error(e);
    } finally {
      sendBtn.disabled = false;
    }
  }

  // Execute a tool by name (routed to the appropriate MCP call)
  async function executeTool(name, input) {
    switch (name) {
      case 'search_knowledge_base':
        return await mcpToolCall('search_knowledge_base', {
          query: input.query,
          max_results: Math.min(Math.max(input.max_results || 5, 1), 15)
        });
      case 'list_documents':
        return await mcpToolCall('list_documents', {});
      case 'get_document_summary':
        return await mcpToolCall('get_document_summary', { document_name: input.document_name });
      default:
        throw new Error(`Unknown tool: ${name}`);
    }
  }

  function addChatMsg(role, text, isHtml = false) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = `chat-msg ${role}`;
    div.innerHTML = isHtml ? text : escHtml(text);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function addToolMsg(toolName, input) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'chat-msg tool';

    let desc = toolName;
    if (toolName === 'search_knowledge_base' && input?.query) {
      desc = `searching: "${escHtml(input.query)}"`;
    } else if (toolName === 'list_documents') {
      desc = 'listing library';
    } else if (toolName === 'get_document_summary' && input?.document_name) {
      desc = `opening: ${escHtml(input.document_name)}`;
    }

    div.innerHTML = `<span class="tool-label">⚙</span>${desc}`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  // === Documents list ===
  async function loadDocs() {
    try {
      const data = await mcpToolCall('list_documents');
      const container = document.getElementById('docsList');

      if (!data.documents || data.documents.length === 0) {
        container.innerHTML = '<div class="empty-state">No documents found.</div>';
        return;
      }

      let html = `<div class="results-info">${data.document_count} tomes in the library</div><div class="doc-list">`;
      for (const doc of data.documents) {
        const name = doc.document.replace(/\.pdf$/i, '').replace(/_/g, ' ');
        html += `
          <div class="doc-item">
            <span class="doc-name">${escHtml(name)}</span>
            <span class="doc-meta">${doc.chunks} chunks · ${doc.max_page} pages</span>
          </div>`;
      }
      html += '</div>';
      container.innerHTML = html;
    } catch(e) {
      document.getElementById('docsList').innerHTML =
        `<div class="empty-state">Failed to load library: ${escHtml(e.message)}</div>`;
    }
  }

  // === Mode switching ===
  function switchMode(mode, ev) {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

    (ev?.target || ev?.currentTarget)?.classList.add('active');
    document.getElementById(`panel-${mode}`).classList.add('active');

    if (mode === 'docs') loadDocs();
    if (mode === 'search') document.getElementById('searchInput').focus();
    if (mode === 'chat') document.getElementById('chatInput').focus();
  }

  // === Utilities ===
  function escHtml(s) {
    if (typeof s !== 'string') return String(s);
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatMarkdown(text) {
    return escHtml(text)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code style="background:rgba(244,232,193,0.1);padding:0.1em 0.3em;border-radius:2px;font-family:var(--font-mono);font-size:0.9em">$1</code>')
      .replace(/^### (.+)$/gm, '<strong style="color:var(--gold);font-family:var(--font-display);font-size:0.9em;letter-spacing:0.05em">$1</strong>')
      .replace(/^## (.+)$/gm, '<strong style="color:var(--gold);font-family:var(--font-display)">$1</strong>')
      .replace(/^- (.+)$/gm, '• $1')
      .replace(/\n/g, '<br>');
  }

  // === Init ===
  initMcp();
</script>
